<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Register - AI Interview Feedback Tool</title>
  <link rel="stylesheet" href="css/style.css" />
  <link rel="stylesheet" href="css/auth.css" />
</head>
<body>
  <header class="navbar">
    <a href="index.html" class="brand"><img src="images/logo.svg" alt="AI Interview Feedback Tool" style="height: 40px; width: auto;"></a>
    <nav class="nav-links">
      <a href="dashboard.html">Dashboard</a>
      <a href="interview.html">Mock Interview</a>
      <a href="feedback.html">Feedback</a>
      <a href="#">History</a>
      <a href="#">Profile</a>
      <a href="index.html">Logout</a>
    </nav>
  </header>

  <div class="auth-container">
    <form class="auth-card">
      <h1>Create Account</h1>
      <p>Start organizing interviews and feedback in minutes.</p>
      <label>Full Name</label>
      <input type="text" placeholder="Your name" />
      <label>Email</label>
      <input type="email" placeholder="you@example.com" />
      <label>Password</label>
      <input type="password" placeholder="Create password" />
      <button type="submit">Register</button>
      <p class="auth-link">Already have an account? <a href="login.html">Log in</a></p>
    </form>
  </div>
  <script src="js/auth.js"></script>
</body>
</html>
