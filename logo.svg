<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 120 120" width="120" height="120">
  <!-- Background circle -->
  <circle cx="60" cy="60" r="55" fill="#E8F4F8" stroke="#2563EB" stroke-width="2"/>
  
  <!-- Brain/Neural network elements -->
  <g fill="none" stroke="#2563EB" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
    <!-- Upper brain curves -->
    <path d="M 35 50 Q 40 35 60 35 Q 80 35 85 50"/>
    <path d="M 35 50 Q 35 45 40 42"/>
    <path d="M 85 50 Q 85 45 80 42"/>
  </g>
  
  <!-- Microphone element -->
  <g fill="#2563EB">
    <!-- Microphone body -->
    <circle cx="60" cy="70" r="8" fill="#2563EB"/>
    <rect x="57" y="78" width="6" height="12" fill="#2563EB" rx="3"/>
    
    <!-- Sound waves -->
    <path d="M 45 70 Q 42 70 42 73" fill="none" stroke="#2563EB" stroke-width="1.5" stroke-linecap="round"/>
    <path d="M 75 70 Q 78 70 78 73" fill="none" stroke="#2563EB" stroke-width="1.5" stroke-linecap="round"/>
    <path d="M 43 65 Q 40 60 40 55" fill="none" stroke="#2563EB" stroke-width="1.5" stroke-linecap="round"/>
    <path d="M 77 65 Q 80 60 80 55" fill="none" stroke="#2563EB" stroke-width="1.5" stroke-linecap="round"/>
  </g>
  
  <!-- Feedback checkmark -->
  <g fill="none" stroke="#10B981" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round">
    <path d="M 88 40 L 92 44 L 98 35"/>
  </g>
  
  <!-- Text -->
  <text x="60" y="105" font-family="Arial, sans-serif" font-size="10" font-weight="bold" text-anchor="middle" fill="#2563EB">AI INTERVIEW</text>
</svg>